<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Milyoner Olmak İster? - Sunucu Modu</title>
    <style>
        :root {
            --dark-blue: #020230;
            --gold: #f0c040;
            --blue-gradient: linear-gradient(180deg, #101060 0%, #020230 100%);
            --border-style: 2px solid #3a3a9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle, #0a0a4e 0%, #000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        .main-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .question-box {
            width: 100%;
            background: var(--blue-gradient);
            border: var(--border-style);
            border-radius: 50px;
            padding: 30px;
            text-align: center;
            font-size: 22px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .answer-btn {
            background: var(--blue-gradient);
            border: var(--border-style);
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            position: relative;
        }

        .answer-btn:hover {
            border-color: var(--gold);
            background: rgba(240, 192, 64, 0.1);
        }

        .answer-btn span { color: var(--gold); font-weight: bold; margin-right: 10px; }

        .selected { background: orange !important; color: black; }
        .correct { background: green !important; border-color: #00ff00; }
        .wrong { background: red !important; border-color: #ff0000; }

        .sidebar {
            background: rgba(0,0,0,0.4);
            border-left: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .money-step {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            color: #aaa;
        }

        .active-step { background: orange; color: black; font-weight: bold; }
        .safe-step { color: white; }

        .joker-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .joker {
            width: 50px;
            height: 35px;
            background: var(--blue-gradient);
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .joker.used { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-btn {
            background: var(--gold);
            border: none;
            padding: 15px 30px;
            margin: 10px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            width: 250px;
        }

        #host-controls {
            margin-top: 20px;
            padding: 20px;
            background: #f0c040;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            display: none;
            cursor: pointer;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            #game-container { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-bottom: 20px; color: var(--gold);">KİM MİLYONER OLMAK İSTER?</h1>
        <button class="start-btn" onclick="initRole('yarismaci')">YARIŞMACI OLARAK BAŞLA</button>
        <button class="start-btn" style="background: #3a3a9a; color: white;" onclick="initRole('sunucu')">SUNUCU OLARAK BAŞLA</button>
        <p style="margin-top: 20px; font-size: 12px; opacity: 0.7;">(İki farklı sekme açıp birini sunucu diğerini yarışmacı yapabilirsiniz)</p>
    </div>

    <div id="game-container">
        <div class="main-area">
            <div class="joker-container">
                <div class="joker" id="joker-50" onclick="use5050()">50:50</div>
                <div class="joker" id="joker-audience" onclick="useAudience()">👥</div>
                <div class="joker" id="joker-phone" onclick="usePhone()">📞</div>
            </div>

            <div class="question-box" id="question-text">Soru bekleniyor...</div>

            <div class="answers-grid">
                <button class="answer-btn" id="btn0" onclick="playerSelect(0)"><span>A:</span> <label id="ans0"></label></button>
                <button class="answer-btn" id="btn1" onclick="playerSelect(1)"><span>B:</span> <label id="ans1"></label></button>
                <button class="answer-btn" id="btn2" onclick="playerSelect(2)"><span>C:</span> <label id="ans2"></label></button>
                <button class="answer-btn" id="btn3" onclick="playerSelect(3)"><span>D:</span> <label id="ans3"></label></button>
            </div>

            <div id="host-controls" onclick="hostConfirm()">SON KARARINIZ MI? ONAYLA</div>
        </div>

        <div class="sidebar" id="money-list"></div>
    </div>

    <script>
        const questions = [
            { q: "Gökyüzü neden mavi görünür?", a: ["Işığın yansıması", "Işığın kırılması", "Işığın saçılması", "Atmosferin rengi"], c: 2 },
            { q: "Hangi gezegen halkalarıyla ünlüdür?", a: ["Mars", "Jüpiter", "Uranüs", "Satürn"], c: 3 },
            { q: "Türkiye'nin en yüksek dağı hangisidir?", a: ["Erciyes", "Ağrı", "Kaçkar", "Uludağ"], c: 1 }
        ];

        const moneySteps = ["1.000.000 TL", "500.000 TL", "250.000 TL", "125.000 TL", "64.000 TL", "32.000 TL", "16.000 TL", "8.000 TL", "4.000 TL", "2.000 TL", "1.000 TL", "500 TL"];
        
        let role = ""; 
        let currentLevel = 0;
        let selectedIdx = null;

        // Senkronizasyon için LocalStorage kullanıyoruz (Aynı tarayıcıda iki sekme)
        window.addEventListener('storage', (e) => {
            if (e.key === 'milyoner_state') {
                syncState();
            }
        });

        function initRole(chosenRole) {
            role = chosenRole;
            document.getElementById('overlay').style.display = 'none';
            if (role === 'sunucu') {
                document.title = "Milyoner - SUNUCU PANELİ";
                alert("Sunucu Modu: Yarışmacının seçimini bekleyin.");
            }
            renderMoneySteps();
            loadQuestion();
        }

        function saveState(data) {
            localStorage.setItem('milyoner_state', JSON.stringify({
                level: currentLevel,
                selected: selectedIdx,
                confirmed: data.confirmed || false,
                ...data
            }));
            syncState();
        }

        function syncState() {
            const state = JSON.parse(localStorage.getItem('milyoner_state'));
            if (!state) return;

            currentLevel = state.level;
            
            // Soru ve Şıkları Yükle
            const qData = questions[currentLevel];
            document.getElementById('question-text').innerText = qData.q;
            for(let i=0; i<4; i++) {
                document.getElementById(`ans${i}`).innerText = qData.a[i];
                document.getElementById(`btn${i}`).className = 'answer-btn';
            }

            // Seçim Kontrolü
            if (state.selected !== null) {
                document.getElementById(`btn${state.selected}`).classList.add('selected');
                if (role === 'sunucu' && !state.confirmed) {
                    document.getElementById('host-controls').style.display = 'block';
                }
            } else {
                document.getElementById('host-controls').style.display = 'none';
            }

            // Onay Kontrolü (Sonuç Ekranı)
            if (state.confirmed) {
                const correctIdx = qData.c;
                document.getElementById(`btn${correctIdx}`).classList.add('correct');
                if (state.selected !== correctIdx) {
                    document.getElementById(`btn${state.selected}`).classList.add('wrong');
                }
                
                // Bir sonraki soruya geçiş (Sadece sunucu tetikler veya otomatik)
                if (role === 'sunucu') {
                    setTimeout(() => {
                        if (state.selected === correctIdx) {
                            currentLevel++;
                            saveState({ level: currentLevel, selected: null, confirmed: false });
                        } else {
                            alert("Yarışma Bitti!");
                            localStorage.clear();
                            location.reload();
                        }
                    }, 3000);
                }
            }
            renderMoneySteps();
        }

        function playerSelect(idx) {
            if (role !== 'yarismaci') return;
            const state = JSON.parse(localStorage.getItem('milyoner_state')) || {};
            if (state.confirmed) return;

            selectedIdx = idx;
            saveState({ level: currentLevel, selected: idx, confirmed: false });
        }

        function hostConfirm() {
            if (role !== 'sunucu') return;
            const state = JSON.parse(localStorage.getItem('milyoner_state'));
            saveState({ ...state, confirmed: true });
        }

        function loadQuestion() {
            syncState();
        }

        function renderMoneySteps() {
            const list = document.getElementById('money-list');
            list.innerHTML = '';
            moneySteps.forEach((m, i) => {
                const stepIdx = moneySteps.length - 1 - i;
                const div = document.createElement('div');
                div.className = `money-step ${stepIdx === currentLevel ? 'active-step' : ''}`;
                if(stepIdx === 1 || stepIdx === 6 || stepIdx === 11) div.classList.add('safe-step');
                div.innerHTML = `<span>${stepIdx + 1}</span> <span>${m}</span>`;
                list.appendChild(div);
            });
        }

        // Jokerler (Basitleştirilmiş)
        function use5050() { alert("Jokerler bu modda manuel yönetilir."); }
        function useAudience() { alert("Jokerler bu modda manuel yönetilir."); }
        function usePhone() { alert("Jokerler bu modda manuel yönetilir."); }

    </script>
</body>
</html>
