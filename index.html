<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Milyoner Olmak İster? - V3 (Kesin Çalışan)</title>
    <style>
        :root {
            --dark-blue: #020230;
            --gold: #f0c040;
            --blue-gradient: linear-gradient(180deg, #101060 0%, #020230 100%);
            --border-style: 2px solid #3a3a9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle, #0a0a4e 0%, #000 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        #game-container {
            width: 100%; max-width: 1000px;
            display: none; grid-template-columns: 3fr 1fr; gap: 20px; padding: 20px;
        }

        .main-area { display: flex; flex-direction: column; align-items: center; gap: 30px; }

        .question-box {
            width: 100%; background: var(--blue-gradient); border: var(--border-style);
            border-radius: 50px; padding: 30px; text-align: center; font-size: 22px;
        }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }

        .answer-btn {
            background: var(--blue-gradient); border: var(--border-style);
            border-radius: 30px; padding: 18px; color: white;
            font-size: 18px; cursor: pointer; text-align: left;
        }

        .answer-btn:hover { border-color: var(--gold); }
        .selected { background: #ff9900 !important; color: black; font-weight: bold; }
        .correct { background: #00aa00 !important; border-color: #00ff00; }
        .wrong { background: #aa0000 !important; border-color: #ff0000; }

        .sidebar { background: rgba(0,0,0,0.5); padding: 15px; display: flex; flex-direction: column; gap: 5px; }
        .money-step { display: flex; justify-content: space-between; padding: 4px 8px; font-size: 14px; color: #888; }
        .active-step { background: orange; color: black; border-radius: 4px; font-weight: bold; }

        .joker-container { display: flex; gap: 15px; margin-bottom: 10px; }
        .joker {
            width: 60px; height: 40px; background: var(--blue-gradient); border: 1px solid var(--gold);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .joker.used { opacity: 0.2; pointer-events: none; }
        .joker.waiting { background: orange; color: black; animation: blink 1s infinite; }

        #host-panel {
            width: 100%; padding: 20px; background: rgba(255,165,0,0.2);
            border: 2px solid orange; border-radius: 20px; text-align: center; display: none;
        }

        .confirm-btn {
            background: orange; color: black; border: none; padding: 12px 30px;
            font-weight: bold; border-radius: 30px; cursor: pointer; font-size: 18px;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999;
        }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color:var(--gold); margin-bottom: 30px;">MİLYONER MODU</h1>
        <button style="background:orange; border:none; padding:15px 40px; border-radius:30px; cursor:pointer; font-weight:bold; margin:10px; width:250px;" onclick="start('sunucu')">SUNUCU PANELİ</button>
        <button style="background:white; border:none; padding:15px 40px; border-radius:30px; cursor:pointer; font-weight:bold; margin:10px; width:250px;" onclick="start('yarismaci')">YARIŞMACI PANELİ</button>
    </div>

    <div id="game-container">
        <div class="main-area">
            <div class="joker-container">
                <div class="joker" id="j0" onclick="jReq('50:50')">50:50</div>
                <div class="joker" id="j1" onclick="jReq('Seyirci')">👥</div>
                <div class="joker" id="j2" onclick="jReq('Telefon')">📞</div>
            </div>

            <div class="question-box" id="q-text">Soru Yükleniyor...</div>

            <div class="answers-grid">
                <button class="answer-btn" id="b0" onclick="pClick(0)">A: <span id="t0"></span></button>
                <button class="answer-btn" id="b1" onclick="pClick(1)">B: <span id="t1"></span></button>
                <button class="answer-btn" id="b2" onclick="pClick(2)">C: <span id="t2"></span></button>
                <button class="answer-btn" id="b3" onclick="pClick(3)">D: <span id="t3"></span></button>
            </div>

            <div id="host-panel">
                <h3 id="h-msg" style="margin-bottom:10px;"></h3>
                <button class="confirm-btn" onclick="hConfirm()">✅ ONAYLA</button>
            </div>
        </div>

        <div class="sidebar" id="money-list"></div>
    </div>

    <script>
        const sorular = [
            { s: "Gökyüzü neden mavi görünür?", c: ["Saçılma", "Yansıma", "Kırılma", "Soğurulma"], d: 0 },
            { s: "Hangi gezegen 'Kızıl Gezegen' olarak bilinir?", c: ["Mars", "Venüs", "Jüpiter", "Satürn"], d: 0 },
            { s: "Türkiye'nin en yüksek dağı hangisidir?", c: ["Erciyes", "Ağrı", "Süphan", "Kaçkar"], d: 1 }
        ];
        const paralar = ["1.000.000", "500.000", "250.000", "125.000", "64.000", "32.000", "16.000", "8.000", "4.000", "2.000", "1.000", "500"];

        let role = "";

        function start(r) {
            role = r;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-container').style.display = 'grid';
            // İlk durumu oluştur (yoksa)
            if(!localStorage.getItem('game')) {
                localStorage.setItem('game', JSON.stringify({lvl:0, sel:null, ok:false, req:null, used:[]}));
            }
            setInterval(sync, 500); // 500ms'de bir zorunlu kontrol
            sync();
        }

        function pClick(i) {
            if(role !== 'yarismaci') return;
            let data = JSON.parse(localStorage.getItem('game'));
            if(data.ok) return;
            data.sel = i;
            localStorage.setItem('game', JSON.stringify(data));
            sync();
        }

        function jReq(type) {
            if(role !== 'yarismaci') return;
            let data = JSON.parse(localStorage.getItem('game'));
            if(data.used.includes(type)) return;
            data.req = type;
            localStorage.setItem('game', JSON.stringify(data));
            sync();
        }

        function hConfirm() {
            if(role !== 'sunucu') return;
            let data = JSON.parse(localStorage.getItem('game'));
            if(data.req) {
                data.used.push(data.req);
                data.req = null;
            } else {
                data.ok = true;
            }
            localStorage.setItem('game', JSON.stringify(data));
            sync();
        }

        function sync() {
            const data = JSON.parse(localStorage.getItem('game'));
            const q = sorular[data.lvl];
            if(!q) return;

            document.getElementById('q-text').innerText = q.s;
            
            for(let i=0; i<4; i++) {
                const btn = document.getElementById('b' + i);
                document.getElementById('t' + i).innerText = q.c[i];
                btn.className = 'answer-btn';
                
                // 50:50 kontrolü
                btn.style.visibility = (data.used.includes('50:50') && i !== q.d && i !== (q.d+1)%4) ? 'hidden' : 'visible';

                if(data.sel === i) btn.classList.add('selected');
                if(data.ok) {
                    if(i === q.d) btn.classList.add('correct');
                    else if(data.sel === i) btn.classList.add('wrong');
                }
            }

            // Joker Görünümü
            const jokers = ['50:50', 'Seyirci', 'Telefon'];
            jokers.forEach((j, i) => {
                const el = document.getElementById('j' + i);
                el.className = 'joker' + (data.used.includes(j) ? ' used' : (data.req === j ? ' waiting' : ''));
            });

            // Sunucu Paneli
            const panel = document.getElementById('host-panel');
            if(role === 'sunucu') {
                if(data.req) {
                    panel.style.display = 'block';
                    document.getElementById('h-msg').innerText = "Joker Talebi: " + data.req;
                } else if(data.sel !== null && !data.ok) {
                    panel.style.display = 'block';
                    document.getElementById('h-msg').innerText = "Son Karar mı?";
                } else {
                    panel.style.display = 'none';
                }

                // Soru geçişi
                if(data.ok) {
                    setTimeout(() => {
                        let fresh = JSON.parse(localStorage.getItem('game'));
                        if(fresh.ok && fresh.sel === q.d) {
                            localStorage.setItem('game', JSON.stringify({...fresh, lvl: fresh.lvl+1, sel:null, ok:false}));
                        } else if(fresh.ok && fresh.sel !== q.d) {
                            alert("Bitti!");
                            localStorage.clear();
                            location.reload();
                        }
                    }, 3000);
                }
            }

            // Para listesi
            const mList = document.getElementById('money-list');
            mList.innerHTML = '';
            paralar.forEach((p, i) => {
                const idx = 11 - i;
                const d = document.createElement('div');
                d.className = 'money-step' + (idx === data.lvl ? ' active-step' : '');
                d.innerHTML = `<span>${idx+1}</span> <span>${p}</span>`;
                mList.appendChild(d);
            });
        }
    </script>
</body>
</html>
