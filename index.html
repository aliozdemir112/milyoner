<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kim Milyoner Olmak İster? - Gemini Edition</title>
    <style>
        :root {
            --dark-blue: #020230;
            --gold: #f0c040;
            --blue-gradient: linear-gradient(180deg, #101060 0%, #020230 100%);
            --border-style: 2px solid #3a3a9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle, #0a0a4e 0%, #000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            padding: 20px;
        }

        /* --- Sol Taraf: Soru Alanı --- */
        .main-area {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .question-box {
            width: 100%;
            background: var(--blue-gradient);
            border: var(--border-style);
            border-radius: 50px;
            padding: 30px;
            text-align: center;
            font-size: 22px;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .answer-btn {
            background: var(--blue-gradient);
            border: var(--border-style);
            border-radius: 30px;
            padding: 15px 25px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s;
            position: relative;
        }

        .answer-btn:hover {
            border-color: var(--gold);
            background: rgba(240, 192, 64, 0.1);
        }

        .answer-btn span { color: var(--gold); font-weight: bold; margin-right: 10px; }

        /* Durum Renkleri */
        .selected { background: orange !important; color: black; }
        .correct { background: green !important; border-color: #00ff00; }
        .wrong { background: red !important; border-color: #ff0000; }

        /* --- Sağ Taraf: Ödül Paneli --- */
        .sidebar {
            background: rgba(0,0,0,0.4);
            border-left: 2px solid rgba(255,255,255,0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .money-step {
            display: flex;
            justify-content: space-between;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            color: #aaa;
        }

        .active-step { background: orange; color: black; font-weight: bold; }
        .safe-step { color: white; }

        /* Jokerler */
        .joker-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .joker {
            width: 50px;
            height: 35px;
            background: var(--blue-gradient);
            border: 1px solid var(--gold);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .joker.used { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }

        /* Giriş ve Bitiş Ekranı */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .start-btn {
            background: var(--gold);
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            #game-container { grid-template-columns: 1fr; }
            .sidebar { order: -1; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-bottom: 20px; color: var(--gold);">MİLYONER'E HOŞ GELDİNİZ</h1>
        <button class="start-btn" onclick="startGame()">OYUNU BAŞLAT</button>
    </div>

    <div id="game-container">
        <div class="main-area">
            <div class="joker-container">
                <div class="joker" id="joker-50" onclick="use5050()">50:50</div>
                <div class="joker" id="joker-audience" onclick="useAudience()">👥</div>
                <div class="joker" id="joker-phone" onclick="usePhone()">📞</div>
            </div>

            <div class="question-box" id="question-text">Soru buraya gelecek...</div>

            <div class="answers-grid">
                <button class="answer-btn" onclick="checkAnswer(0)"><span>A:</span> <label id="ans0"></label></button>
                <button class="answer-btn" onclick="checkAnswer(1)"><span>B:</span> <label id="ans1"></label></button>
                <button class="answer-btn" onclick="checkAnswer(2)"><span>C:</span> <label id="ans2"></label></button>
                <button class="answer-btn" onclick="checkAnswer(3)"><span>D:</span> <label id="ans3"></label></button>
            </div>
        </div>

        <div class="sidebar" id="money-list">
            </div>
    </div>

    <script>
        const questions = [
            { q: "Gökyüzü neden mavi görünür?", a: ["Işığın yansıması", "Işığın kırılması", "Işığın saçılması", "Atmosferin rengi"], c: 2 },
            { q: "Hangi gezegen halkalarıyla ünlüdür?", a: ["Mars", "Jüpiter", "Uranüs", "Satürn"], c: 3 },
            { q: "Türkiye'nin en yüksek dağı hangisidir?", a: ["Erciyes", "Ağrı", "Kaçkar", "Uludağ"], c: 1 },
            { q: "İstiklal Marşı hangi yıl kabul edilmiştir?", a: ["1920", "1921", "1923", "1924"], c: 1 },
            { q: "Sinekli Bakkal romanının yazarı kimdir?", a: ["Reşat Nuri", "Halide Edip", "Yaşar Kemal", "Zülfü Livaneli"], c: 1 },
            { q: "Bir gün kaç saniyedir?", a: ["86400", "84600", "86200", "90000"], c: 0 },
            { q: "Hangisi bir programlama dili değildir?", a: ["Python", "Java", "HTML", "C++"], c: 2 }
        ];

        const moneySteps = ["1.000.000 TL", "500.000 TL", "250.000 TL", "125.000 TL", "64.000 TL", "32.000 TL", "16.000 TL", "8.000 TL", "4.000 TL", "2.000 TL", "1.000 TL", "500 TL"];
        
        let currentLevel = 0;
        let isAnswering = false;

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            renderMoneySteps();
            loadQuestion();
        }

        function renderMoneySteps() {
            const list = document.getElementById('money-list');
            list.innerHTML = '';
            moneySteps.forEach((m, i) => {
                const stepIdx = moneySteps.length - 1 - i;
                const div = document.createElement('div');
                div.className = `money-step ${stepIdx === currentLevel ? 'active-step' : ''}`;
                if(stepIdx === 1 || stepIdx === 6 || stepIdx === 11) div.classList.add('safe-step');
                div.innerHTML = `<span>${stepIdx + 1}</span> <span>${m}</span>`;
                list.appendChild(div);
            });
        }

        function loadQuestion() {
            isAnswering = false;
            const qData = questions[currentLevel] || questions[questions.length - 1]; // Örnek biterse son soruyu döner
            document.getElementById('question-text').innerText = qData.q;
            
            const btns = document.querySelectorAll('.answer-btn');
            btns.forEach((btn, i) => {
                btn.className = 'answer-btn';
                btn.style.visibility = 'visible';
                document.getElementById(`ans${i}`).innerText = qData.a[i];
            });
            renderMoneySteps();
        }

        function checkAnswer(idx) {
            if(isAnswering) return;
            isAnswering = true;

            const correctIdx = questions[currentLevel].c;
            const btns = document.querySelectorAll('.answer-btn');

            btns[idx].classList.add('selected');

            setTimeout(() => {
                if(idx === correctIdx) {
                    btns[idx].classList.replace('selected', 'correct');
                    setTimeout(() => {
                        currentLevel++;
                        if(currentLevel >= questions.length) {
                            alert("TEBRİKLER! MİLYONER OLDUNUZ!");
                            location.reload();
                        } else {
                            loadQuestion();
                        }
                    }, 1500);
                } else {
                    btns[idx].classList.replace('selected', 'wrong');
                    btns[correctIdx].classList.add('correct');
                    setTimeout(() => {
                        alert("Maalesef kaybettiniz. Ödülünüz: " + (currentLevel > 0 ? moneySteps[moneySteps.length - currentLevel] : "0 TL"));
                        location.reload();
                    }, 2000);
                }
            }, 1000);
        }

        // Jokerler
        function use5050() {
            if(document.getElementById('joker-50').classList.contains('used') || isAnswering) return;
            const correctIdx = questions[currentLevel].c;
            let removed = 0;
            const indices = [0,1,2,3].filter(i => i !== correctIdx).sort(() => Math.random() - 0.5);
            
            indices.slice(0, 2).forEach(idx => {
                document.querySelectorAll('.answer-btn')[idx].style.visibility = 'hidden';
            });
            document.getElementById('joker-50').classList.add('used');
        }

        function useAudience() {
            if(document.getElementById('joker-audience').classList.contains('used') || isAnswering) return;
            const correctLetter = ["A", "B", "C", "D"][questions[currentLevel].c];
            alert("Seyircilerin %72'si " + correctLetter + " şıkkını düşünüyor.");
            document.getElementById('joker-audience').classList.add('used');
        }

        function usePhone() {
            if(document.getElementById('joker-phone').classList.contains('used') || isAnswering) return;
            alert("Arkadaşın: 'Emin değilim ama sanırım cevap " + ["A", "B", "C", "D"][questions[currentLevel].c] + ".'");
            document.getElementById('joker-phone').classList.add('used');
        }
    </script>
</body>
</html>
